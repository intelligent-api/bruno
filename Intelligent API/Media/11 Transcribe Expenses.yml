info:
  name: 11 Transcribe Expenses
  type: http
  seq: 11

http:
  method: POST
  url: "{{baseUrl}}v1/speech/expenses?classifications=Food & Dining,Transport,Shopping,Utilities,Entertainment,Health,Education,Other"
  params:
    - name: classifications
      value: "Food "
      type: query
    - name: " Dining,Transport,Shopping,Utilities,Entertainment,Health,Education,Other"
      value: ""
      type: query
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value:
          - audiofile.opus
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
