info:
  name: 03 Translate
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}v1/language/translate"
  headers:
    - name: X-Correlation-Id
      value: dfe8e127-14aa-42e5-8397-118ebd4594b3
      disabled: true
  body:
    type: json
    data: |-
      {
          "text": "Il était une fois un fermier nommé Henry qui plantait des citrouilles pour s'amuser, mais ses citrouilles ne poussaient pas, elles se ratatinaient et mouraient. Henry devait comprendre ce qui n'allait pas, alors il demanda à son ami George. George comprit qu'il ne pourrait aider Henry que s'il voyait réellement ce qu'il avait fait, alors il prit rendez-vous pour aller à la ferme d'Henry et voir ses citrouilles. Lorsque le moment convenu approcha, George se rendit à la ferme d'Henry et alla voir la plantation de citrouilles, pour découvrir qu'Henry avait essayé de faire pousser les graines dans de l'eau seulement. George expliqua à Henry que cela ne marcherait jamais, et Henry écouta George et planta de nouvelles graines de citrouilles dans la boue, les arrosa et elles poussèrent.",
          "sourceLanguage": "auto",
          "targetLanguage": "en"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
