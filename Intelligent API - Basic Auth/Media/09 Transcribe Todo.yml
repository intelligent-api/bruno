info:
  name: 09 Transcribe Todo
  type: http
  seq: 9

http:
  method: POST
  url: "{{baseUrl}}v1/speech/todo?user_date=05/05/2026&user_day=Tuesday&user_time=10:15 AM"
  params:
    - name: user_date
      value: 05/05/2026
      type: query
    - name: user_day
      value: Tuesday
      type: query
    - name: user_time
      value: 10:15 AM
      type: query
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value:
          - audiofile.ogg
  auth:
    type: basic
    username: "{{basicAuthClientId}}"
    password: "{{basicAuthClientSecret}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
