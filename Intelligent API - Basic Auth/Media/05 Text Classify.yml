info:
  name: 05 Text Classify
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}v1/text/classify"
  body:
    type: json
    data: |-
      {
        "text": "Bananas",
        "classifications": ["Food & Dining", "Transport", "Shopping", "Utilities", "Entertainment", "Health", "Education", "Other"]
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
