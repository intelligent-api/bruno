info:
  name: 03 Image Calorie Count
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}v1/image/calories"
  headers:
    - name: X-Correlation-Id
      value: dfe8e127-14aa-42e5-8397-118ebd4594b3
      disabled: true
  body:
    type: file
    data:
      - filePath: foodpic.jpg
        contentType: image/jpeg
        selected: true
  auth:
    type: basic
    username: "{{basicAuthClientId}}"
    password: "{{basicAuthClientSecret}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
