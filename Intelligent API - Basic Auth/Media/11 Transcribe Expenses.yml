info:
  name: 11 Transcribe Expenses
  type: http
  seq: 11

http:
  method: POST
  url: "{{baseUrl}}v1/speech/expenses?classifications=Food%20%26%20Dining,Transport,Shopping,Utilities,Entertainment,Health,Education,Other"
  params:
    - name: classifications
      value: Food%20%26%20Dining,Transport,Shopping,Utilities,Entertainment,Health,Education,Other
      type: query
  body:
    type: multipart-form
    data:
      - name: file
        type: file
        value:
          - audiofile.opus
  auth:
    type: basic
    username: "{{basicAuthClientId}}"
    password: "{{basicAuthClientSecret}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
